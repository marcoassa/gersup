<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>GERSUP</title>
    <!--
      GitHub Pages SPA Redirect
      Redireciona qualquer rota de sub-caminho de volta para index.html
      para que o React Router possa processar a URL corretamente.
      Técnica de: https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      var pathSegmentsToKeep = 1; // número de segmentos do base path (/gersup)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
